name: Build Fork

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main

jobs:
  build-amd64:
    name: Build linux/amd64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP 'const VERSION: &str = "\K[^"]+' src/main.rs || echo "latest")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest (amd64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/vaultwarden,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/vaultwarden-buildcache:amd64
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/vaultwarden-buildcache:amd64,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-arm:
    name: Build linux/arm64 + arm/v7 + arm/v6
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # arm64 is native on this runner; arm/v7 and arm/v6 need QEMU (32-bit)
      - name: Set up QEMU (for arm/v7 and arm/v6)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest (arm64 + arm/v7 + arm/v6)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64,linux/arm/v7,linux/arm/v6
          provenance: false
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/vaultwarden,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/vaultwarden-buildcache:arm
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/vaultwarden-buildcache:arm,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-arm
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifests and push tags
    runs-on: ubuntu-24.04
    needs: [build-amd64, build-arm]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP 'const VERSION: &str = "\K[^"]+' src/main.rs || echo "latest")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download all digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          DIGESTS=$(printf "ghcr.io/${REPO_OWNER}/vaultwarden@sha256:%s " $(ls /tmp/digests))
          docker buildx imagetools create \
            -t "ghcr.io/${REPO_OWNER}/vaultwarden:latest" \
            -t "ghcr.io/${REPO_OWNER}/vaultwarden:${VERSION}" \
            ${DIGESTS}
